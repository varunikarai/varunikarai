name: Generate contribution snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create assets directory
        run: mkdir -p assets

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github-dark&color_snake=%23F7A8C4&color_dots=%23161B22,%2330384A,%23C8A2C8,%23E8B4D3,%23F7A8C4
      

      - name: Commit and push generated snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg
          if ! git diff --cached --quiet; then
            git commit -m "Update contribution snake"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi
