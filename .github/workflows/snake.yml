name: Generate contribution snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          svg_out_path: assets/github-contribution-grid-snake.svg
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "Update contribution snake"

      - name: Match snake palette to profile theme
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('assets/github-contribution-grid-snake.svg')
          if not path.exists():
              raise SystemExit('Snake SVG was not generated')
          text = path.read_text()
          replacements = {
              '#0E4429': '#0D1117',
              '#006D32': '#F7A8C4',
              '#26A641': '#C8A2C8',
              '#39D353': '#F7A8C4',
              '#161B22': '#0D1117',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Commit generated snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg
          if ! git diff --cached --quiet; then
            git commit -m "Update contribution snake"
          fi
